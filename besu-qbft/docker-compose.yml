version: '3.8'

x-besu-def: &besu-def
  image: hyperledger/besu:latest
  networks:
    - qbft-network

services:
  node1:
    <<: *besu-def
    container_name: besu-node1
    command:
      - --data-path=/data
      - --genesis-file=/genesis.json
      - --network-id=1337
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,QBFT
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --profile=ENTERPRISE
    volumes:
      - ./genesis.json:/genesis.json
      - ./node1/data:/data
    ports:
      - '8545:8545'
    networks:
      qbft-network:
        ipv4_address: 172.16.239.11

  node2:
    <<: *besu-def
    container_name: besu-node2
    command:
      - --data-path=/data
      - --genesis-file=/genesis.json
      - --bootnodes=enode://07edfc601e7e782d4d2e5cf7a7c3cf2962e266ceebed61ebfd11796f059d60312279b44c6d8b4bf660490e014ab1403ff8d50d521f0f3575096f43d271b358d9@172.16.239.11:30303
      - --network-id=1337
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,QBFT
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --profile=ENTERPRISE
    volumes:
      - ./genesis.json:/genesis.json
      - ./node2/data:/data
    ports:
      - '8546:8545'
    depends_on:
      - node1

  node3:
    <<: *besu-def
    container_name: besu-node3
    command:
      - --data-path=/data
      - --genesis-file=/genesis.json
      - --bootnodes=enode://07edfc601e7e782d4d2e5cf7a7c3cf2962e266ceebed61ebfd11796f059d60312279b44c6d8b4bf660490e014ab1403ff8d4d50d521f0f3575096f43d271b358d9@172.16.239.11:30303
      - --network-id=1337
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,QBFT
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --profile=ENTERPRISE
    volumes:
      - ./genesis.json:/genesis.json
      - ./node3/data:/data
    ports:
      - '8547:8545'
    depends_on:
      - node1

  node4:
    <<: *besu-def
    container_name: besu-node4
    command:
      - --data-path=/data
      - --genesis-file=/genesis.json
      - --bootnodes=enode://07edfc601e7e782d4d2e5cf7a7c3cf2962e266ceebed61ebfd11796f059d60312279b44c6d8b4bf660490e014ab1403ff8d50d521f0f3575096f43d271b358d9@172.16.239.11:30303
      - --network-id=1337
      - --rpc-http-enabled
      - --rpc-http-api=ETH,NET,QBFT
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --profile=ENTERPRISE
    volumes:
      - ./genesis.json:/genesis.json
      - ./node4/data:/data
    ports:
      - '8548:8545'
    depends_on:
      - node1

networks:
  qbft-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.239.0/24
